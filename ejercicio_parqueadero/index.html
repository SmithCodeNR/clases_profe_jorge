<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="parqueadero.css">
  <title>Portafolio</title>
</head>
<body>
	<main>
    	<div class="formulario">

      		<div class="logo">
        	<h2>Parqueadero Parchese</h2>
      		</div>
			<br>
      		<div class="placas">
				<div class="vehiculo">
					<div class="tipo">
						<label for="text">TIPO DE VEHICULO:</label>
						<select name="tipoVehiculo" id="tipoVehiculo">
							<option value="auto">auto</option>
							<option value="moto">moto</option>
						</select>
					</div>
					<div class="placa">
						<label for="text">PLACA DEL VEHICULO:</label>
						<input id="placa"  type="text" placeholder="ACB123" required>
					</div>
				</div>
			</div>
			<br>
			<div class="horario">
				<div class="fechas">
					<div class="inicio">
						<label for="text">Fecha De Inicio:</label>
						<input id="inicio" type="datetime-local" required>
					</div>
					<div class="salida">
						<label for="text">Fecha De Salida:</label>
						<input id="salida" type="datetime-local" required>
					</div>
				</div>
			</div>
			<br>
			<button id="calcular" type="click">calcular</button>
    	</div>
		<div class="formulario">

			<div class="logo" id="logo">
      		</div>

			<div class="datos">
				<div class="registrados">

					<div id="usuario"></div>
					
				</div>
			</div>
			<div class="datos">
				<div class="registrados" >

					<div id="pagos"></div>
					
				</div>
			</div>
			

			
			
		</div>
  	</main>
	<script src="parqueadero.js"></script>
</body>
</html>
